<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oráculo da Gratidão 365</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.344.0",
            "clsx": "https://esm.sh/clsx@2.1.0",
            "tailwind-merge": "https://esm.sh/tailwind-merge@2.2.1"
        }
    }
    </script>
</head>
<body class="bg-[#1a1512]">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
            Sparkles, CheckCircle, Trophy, Save, Quote, LockKeyhole, 
            UnlockKeyhole, PenLine, Calendar, HelpCircle, Zap, 
            ChevronDown, ChevronUp, ArrowRight, BookOpen, ArrowLeft, 
            Volume2, VolumeX, Leaf, Sun, Moon, Star, Heart, Feather
        } from 'lucide-react';
        import { clsx } from 'clsx';
        import { twMerge } from 'tailwind-merge';

        function cn(...inputs) {
            return twMerge(clsx(inputs));
        }

        const FRASES_ORACULO = [
            // --- Originais ---
            "Qual foi a pequena vitória de hoje que quase passou despercebida?",
            "Agradeço pela oportunidade de recomeçar a cada novo amanhecer.",
            "Sou grato pelas pessoas que trazem luz aos meus dias mais nublados.",
            "Quem te fez sorrir hoje e por quê?",
            "Que desafio você enfrentou hoje que te deixou mais forte?",
            "Agradeço pela saúde que me permite experimentar a vida.",
            "Qual foi a coisa mais bonita que você viu hoje?",
            "Sou grato pelo alimento na minha mesa e pelo teto que me protege.",
            "Que oportunidade de aprender algo novo você teve nas últimas 24 horas?",
            "Agradeço pela paz de espírito que estou cultivando.",
            // --- Reflexão pessoal ---
            "O que há de bom na sua vida que você já se acostumou e esqueceu de valorizar?",
            "Qual abraço ou toque te fez sentir acolhido recentemente?",
            "Se você escrevesse uma carta de agradecimento ao dia de hoje, o que diria?",
            "Que parte do seu corpo trabalhou sem parar por você hoje?",
            "Qual cheiro te trouxe conforto ou uma boa lembrança hoje?",
            "Que conversa recente te fez pensar de um jeito diferente?",
            "Qual rotina simples do seu dia torna tudo mais leve?",
            "Que lugar no mundo te faz sentir em paz só de lembrar?",
            "Qual foi a última vez que você riu de verdade? Do que foi?",
            "Que permissão você se deu hoje que te fez bem?",
            // --- Conexão e pessoas ---
            "Quem é a pessoa que mais te entende sem precisar de palavras?",
            "Que mensagem ou ligação inesperada te alegrou nos últimos dias?",
            "Se pudesse reviver um momento feliz com alguém, qual seria?",
            "Qual professor, mentor ou amigo plantou uma semente que você colhe até hoje?",
            "Quem te ensinou algo importante sem nem perceber que estava ensinando?",
            "Que ato de generosidade você presenciou recentemente?",
            "Qual amizade, mesmo de longe, te dá segurança só de saber que existe?",
            "Quem você admira pela forma como enfrenta a vida?",
            "Que palavras de encorajamento você ouviu e nunca esqueceu?",
            "Por qual relação na sua vida você sente mais gratidão agora?",
            // --- Natureza e simplicidade ---
            "Quando foi a última vez que o céu te deixou sem palavras?",
            "Que som da natureza te acalma instantaneamente?",
            "Qual estação do ano te faz sentir mais vivo e por quê?",
            "Que planta, árvore ou flor te chamou a atenção recentemente?",
            "Qual foi o pôr do sol ou nascer do sol mais bonito que você lembra?",
            "Que momento de silêncio te trouxe clareza nos últimos dias?",
            "A chuva de hoje trouxe alguma sensação boa? Qual?",
            "Que animal te arrancou um sorriso recentemente?",
            "Qual paisagem você gostaria de ver de novo?",
            "O que a natureza te ensinou sobre paciência?",
            // --- Crescimento e força ---
            "Que versão passada de você ficaria orgulhosa de quem você é hoje?",
            "Qual medo você já superou que antes parecia impossível?",
            "Que cicatriz, física ou emocional, te lembra da sua resiliência?",
            "Qual decisão difícil do passado se revelou acertada com o tempo?",
            "Que hábito novo está mudando sua vida aos poucos?",
            "Qual limite você aprendeu a colocar que te trouxe mais paz?",
            "Que livro, filme ou música te transformou de alguma forma?",
            "Qual fracasso te ensinou a lição mais valiosa da sua vida?",
            "Que coragem pequena você teve hoje que ninguém viu?",
            "Pelo que você vai agradecer ao olhar para trás daqui a um ano?",
            // --- Momentos e sensações ---
            "Qual foi o primeiro pensamento bom que você teve ao acordar hoje?",
            "Que sabor te trouxe felicidade nas últimas horas?",
            "Qual música tocou e pareceu ter sido feita para o seu momento?",
            "Que gargalhada você deu que relaxou todo o seu corpo?",
            "Qual foi o momento mais tranquilo do seu dia até agora?",
            "Que pequeno luxo do dia a dia te faz sentir especial?",
            "Qual foi a melhor notícia que você recebeu esta semana?",
            "Que detalhe bonito você notou hoje que a maioria ignoraria?",
            "Qual sensação de conforto você sentiu hoje — um café quente, um cobertor, um banho longo?",
            "Se o dia de hoje fosse um presente, qual seria o laço que o embrulha?"
        ];

        const PERGUNTAS_PODEROSAS = [
            "Qual foi a pequena vitória de hoje que quase passou despercebida?",
            "Quem te fez sorrir hoje e por quê?",
            "Que desafio você enfrentou hoje que te deixou mais forte?",
            "Qual foi a coisa mais bonita que você viu hoje?",
            "Que oportunidade de aprender algo novo você teve nas últimas 24 horas?",
            "Pelo que você é grato(a) no seu corpo hoje?",
            "Qual é a música ou som que te trouxe paz recentemente?",
            "O que deu mais certo do que você esperava hoje?",
            "Se pudesse agradecer a alguém do seu passado, quem seria?",
            "Qual é o conforto material que você mais valoriza agora?",
            "Qual talento ou habilidade sua te ajudou hoje?",
            "Qual foi o gesto de gentileza (dado ou recebido) que marcou seu dia?",
            "O que te deixa animado(a) para o dia de amanhã?",
            "Qual erro você cometeu recentemente que trouxe uma lição valiosa?",
            "Pelo que você é grato(a) na sua casa neste momento?",
            "Qual foi o momento de maior paz que você sentiu hoje?",
            "Qual habilidade sua você usou hoje, mas que às vezes nem valoriza tanto?",
            "Qual refeição ou comidinha você mais curtiu nas últimas 24 horas?",
            "Que detalhe da natureza chamou sua atenção hoje?",
            "Se tivesse que se agradecer por algo que fez hoje, o que seria?",
            "Que tecnologia ou ferramenta facilitou sua vida hoje?",
            "Qual memória de infância traz um quentinho pro coração e te faz sentir gratidão?",
            "Que frase, livro ou ideia te inspirou recentemente?",
            "Em que momento você se sentiu mais útil ou produtivo(a) hoje?",
            "Pelo que você é grato(a) no seu trabalho ou estudos?",
            "Qual traço da sua personalidade te ajudou a superar um obstáculo hoje?",
            "Quem é aquela pessoa que sempre te apoia, e por que você é grato(a) por ela hoje?",
            "Qual som gostoso você ouviu hoje (chuva, riso, música)?",
            "Qual privilégio que você tem hoje facilita muito a sua rotina?",
            "O que te dá esperança para o futuro neste exato momento?"
        ];

        function App() {
            const [isRevealed, setIsRevealed] = useState(false);
            const [currentView, setCurrentView] = useState('home'); 
            const [entry, setEntry] = useState("");
            const [savedEntries, setSavedEntries] = useState({});
            const [streak, setStreak] = useState(0);
            const [isSaved, setIsSaved] = useState(false);
            const [todayPhrase, setTodayPhrase] = useState("");
            
            const [userName, setUserName] = useState("");
            const [tempName, setTempName] = useState("");
            const [showOnboarding, setShowOnboarding] = useState(false);
            
            const [activeBonus, setActiveBonus] = useState(null);

            const now = new Date();
            const todayKey = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
            const jaEscreveuHoje = !!savedEntries[todayKey];

            const sortearFrase = () => {
                const randomIndex = Math.floor(Math.random() * FRASES_ORACULO.length);
                setTodayPhrase(FRASES_ORACULO[randomIndex]);
            };

            useEffect(() => {
                const storedData = localStorage.getItem('oraculo_gratidao');
                sortearFrase();
                if (storedData) {
                    const parsed = JSON.parse(storedData);
                    setSavedEntries(parsed.entries || {});
                    setStreak(parsed.streak || 0);
                    if (parsed.userName) {
                        setUserName(parsed.userName);
                    } else {
                        setShowOnboarding(true);
                    }
                    if (parsed.entries && parsed.entries[todayKey]) {
                        setIsRevealed(true);
                    }
                } else {
                    setShowOnboarding(true);
                }
            }, [todayKey]);

            const saveName = () => {
                if (!tempName.trim()) return;
                setUserName(tempName);
                setShowOnboarding(false);
                const storedData = JSON.parse(localStorage.getItem('oraculo_gratidao') || '{}');
                localStorage.setItem('oraculo_gratidao', JSON.stringify({ ...storedData, userName: tempName }));
            };

            const getGreeting = () => {
                const hour = new Date().getHours();
                if (hour >= 5 && hour < 12) return "Bom dia";
                if (hour >= 12 && hour < 18) return "Boa tarde";
                return "Boa noite";
            };

            const getGreetingIcon = () => {
                const hour = new Date().getHours();
                if (hour >= 5 && hour < 12) return <Sun size={16} className="text-amber-400" />;
                if (hour >= 12 && hour < 18) return <Sun size={16} className="text-orange-400" />;
                return <Moon size={16} className="text-indigo-300" />;
            };

            const saveEntry = () => {
                if (!entry.trim()) return;
                const textoAnterior = savedEntries[todayKey] || "";
                const textoFinal = textoAnterior ? `${textoAnterior}\n\n${entry}` : entry;
                const newEntries = { ...savedEntries, [todayKey]: textoFinal };
                let newStreak = streak;
                if (!savedEntries[todayKey]) {
                    newStreak += 1;
                }
                const storedData = JSON.parse(localStorage.getItem('oraculo_gratidao') || '{}');
                const dataToSave = {
                    ...storedData,
                    entries: newEntries,
                    streak: newStreak,
                    userName: userName
                };
                localStorage.setItem('oraculo_gratidao', JSON.stringify(dataToSave));
                setSavedEntries(newEntries);
                setStreak(newStreak);
                setIsSaved(true);
                setTimeout(() => {
                    setIsSaved(false);
                    setEntry(""); 
                    setIsRevealed(false); 
                    sortearFrase(); 
                    setCurrentView('history');
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }, 1200);
            };

            const injectQuestion = (question) => {
                setEntry(prev => prev ? `${prev}\n\n${question} ` : `${question} `);
                setIsRevealed(true); 
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            // --- Sub-components ---

            const HabitCalendar = () => {
                const now = new Date();
                const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
                const firstDayOfMonth = new Date(now.getFullYear(), now.getMonth(), 1).getDay();
                
                return (
                    <div className="p-5 sm:p-6 bg-[#1e1a16] border-t border-[#3a3028] animate-reveal overflow-x-auto">
                        <div className="grid grid-cols-7 gap-1.5 sm:gap-2 text-center mb-2 min-w-[240px]">
                            {['D', 'S', 'T', 'Q', 'Q', 'S', 'S'].map((d, i) => (
                                <span key={`h-${i}`} className="text-[9px] sm:text-[10px] font-bold text-[#8a7e6d] uppercase tracking-wider">{d}</span>
                            ))}
                            {Array.from({ length: firstDayOfMonth }).map((_, i) => <div key={`e-${i}`} />)}
                            {Array.from({ length: daysInMonth }).map((_, i) => {
                                const day = i + 1;
                                const dateStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                                const hasEntry = !!savedEntries[dateStr];
                                const isToday = dateStr === todayKey;

                                return (
                                    <div 
                                        key={`d-${day}`} 
                                        className={cn(
                                            "aspect-square flex items-center justify-center rounded-lg text-xs sm:text-sm font-bold transition-all",
                                            hasEntry ? "bg-gradient-to-br from-amber-500 to-orange-600 text-white shadow-md shadow-amber-900/30" : "bg-[#2a2420] text-[#5a5045]",
                                            isToday && !hasEntry && "ring-2 ring-amber-500/50 text-amber-400"
                                        )}
                                    >
                                        {day}
                                    </div>
                                );
                            })}
                        </div>
                        <button 
                            onClick={() => setActiveBonus(null)} 
                            className="w-full mt-4 pt-3 flex items-center justify-center gap-1.5 text-[10px] sm:text-xs font-bold text-[#8a7e6d] hover:text-amber-400 uppercase tracking-widest transition-colors border-t border-[#3a3028]"
                        >
                            <ChevronUp size={14} /> Fechar Calendário
                        </button>
                    </div>
                );
            };

            const QuestionsList = () => (
                <div className="p-5 sm:p-6 bg-[#1e1a16] border-t border-[#3a3028] animate-reveal">
                    <div className="max-h-80 overflow-y-auto pr-2 custom-scrollbar">
                        <p className="text-[11px] sm:text-xs text-[#8a7e6d] mb-4 font-medium">Clique em uma pergunta para usá-la como inspiração no diário de hoje.</p>
                        <div className="space-y-2">
                            {PERGUNTAS_PODEROSAS.map((q, i) => (
                                <button 
                                    key={i}
                                    onClick={() => injectQuestion(q)}
                                    className="w-full text-left p-3.5 sm:p-4 rounded-xl bg-[#2a2420] border border-[#3a3028] hover:border-amber-600/50 hover:bg-[#332c24] transition-all text-xs sm:text-sm font-medium text-[#c4b8a8] flex items-start gap-3 group"
                                >
                                    <span className="text-amber-600 font-black text-[10px] sm:text-xs mt-0.5 group-hover:text-amber-400 transition-colors shrink-0 font-mono">{(i+1).toString().padStart(2, '0')}</span>
                                    <span className="group-hover:text-[#e8ddd0] transition-colors">{q}</span>
                                </button>
                            ))}
                        </div>
                    </div>
                    <button 
                        onClick={() => setActiveBonus(null)} 
                        className="w-full mt-4 pt-3 flex items-center justify-center gap-1.5 text-[10px] sm:text-xs font-bold text-[#8a7e6d] hover:text-amber-400 uppercase tracking-widest transition-colors border-t border-[#3a3028]"
                    >
                        <ChevronUp size={14} /> Fechar Perguntas
                    </button>
                </div>
            );

            const EmergencyRitual = () => {
                const [isActive, setIsActive] = useState(false);
                const [isSoundOn, setIsSoundOn] = useState(true);
                const [breathState, setBreathState] = useState({ text: 'Toque no círculo para iniciar', action: 'idle' });

                const speakText = (text) => {
                    if (!isSoundOn || !window.speechSynthesis) return;
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'pt-BR';
                    utterance.rate = 0.85; 
                    utterance.pitch = 1.1; 
                    const voices = window.speechSynthesis.getVoices();
                    const ptVoices = voices.filter(v => v.lang.includes('pt'));
                    const femaleVoice = ptVoices.find(v => /luciana|joana|vitoria|marcia|female|mulher/i.test(v.name));
                    if (femaleVoice) {
                        utterance.voice = femaleVoice;
                    } else if (ptVoices.length > 0) {
                        const googleVoice = ptVoices.find(v => v.name.includes('Google'));
                        utterance.voice = googleVoice || ptVoices[0];
                    }
                    window.speechSynthesis.speak(utterance);
                };

                useEffect(() => {
                    if (window.speechSynthesis) {
                        window.speechSynthesis.getVoices();
                    }
                }, []);

                useEffect(() => {
                    if (!isActive) {
                        setBreathState({ text: 'Toque no círculo para iniciar', action: 'idle' });
                        if (window.speechSynthesis) window.speechSynthesis.cancel();
                        return;
                    }
                    const cycle = [
                        { text: 'Inspire profundamente...', action: 'inhale', duration: 4000, speech: 'Inspire' },
                        { text: 'Segure o ar...', action: 'hold-in', duration: 4000, speech: 'Segure' },
                        { text: 'Solte devagar...', action: 'exhale', duration: 4000, speech: 'Solte' },
                        { text: 'Fique sem ar...', action: 'hold-out', duration: 4000, speech: 'Segure' }
                    ];
                    let step = 0;
                    let timeoutId;
                    const runCycle = () => {
                        const currentStep = cycle[step];
                        setBreathState(currentStep);
                        speakText(currentStep.speech); 
                        timeoutId = setTimeout(() => {
                            step = (step + 1) % cycle.length;
                            runCycle();
                        }, currentStep.duration);
                    };
                    runCycle(); 
                    return () => {
                        clearTimeout(timeoutId);
                        if (window.speechSynthesis) window.speechSynthesis.cancel();
                    };
                }, [isActive, isSoundOn]); 

                const getCircleClasses = () => {
                    if (breathState.action === 'idle') return "scale-100 bg-amber-900/30 border-2 border-amber-700/40 animate-pulse-soft";
                    if (breathState.action === 'inhale' || breathState.action === 'hold-in') return "scale-150 bg-amber-500/40 border-0 shadow-[0_0_60px_rgba(217,119,6,0.3)]";
                    if (breathState.action === 'exhale' || breathState.action === 'hold-out') return "scale-100 bg-amber-800/30 border-0";
                    return "scale-100 bg-amber-900/30";
                };

                return (
                    <div className="p-5 sm:p-6 bg-[#1e1a16] border-t border-[#3a3028] animate-reveal text-center">
                        <div className="mb-6 flex justify-between items-start">
                            <div className="text-left">
                                <h4 className="font-bold text-[#e8ddd0] text-base sm:text-lg mb-1.5 flex items-center gap-2">Meditação S.O.S <span className="text-lg">🧘‍♀️</span></h4>
                                <p className="text-xs sm:text-sm text-[#8a7e6d] leading-relaxed max-w-sm">
                                    Ansiedade trava a criatividade. Vamos acalmar seu sistema nervoso com a respiração de 4 tempos guiada por voz.
                                </p>
                            </div>
                            <button 
                                onClick={() => setIsSoundOn(!isSoundOn)}
                                className={cn(
                                    "p-2.5 rounded-full transition-colors shrink-0",
                                    isSoundOn ? "bg-amber-900/40 text-amber-400" : "bg-[#2a2420] text-[#5a5045]"
                                )}
                                title={isSoundOn ? "Desativar voz" : "Ativar voz"}
                            >
                                {isSoundOn ? <Volume2 size={18} /> : <VolumeX size={18} />}
                            </button>
                        </div>

                        <div className="relative h-52 sm:h-60 flex flex-col items-center justify-center bg-[#151210] rounded-2xl mb-6 overflow-hidden border border-[#2a2420]">
                            {/* Ambient glow */}
                            <div className="absolute inset-0 bg-[radial-gradient(circle_at_center,rgba(217,119,6,0.06)_0%,transparent_70%)]" />
                            
                            <div 
                                className={cn(
                                    "w-20 h-20 sm:w-24 sm:h-24 rounded-full transition-all duration-[4000ms] ease-in-out absolute flex items-center justify-center z-10 cursor-pointer",
                                    getCircleClasses()
                                )}
                                onClick={() => !isActive && setIsActive(true)}
                            />
                            
                            <div className="relative z-20 mt-36 sm:mt-40 pointer-events-none">
                                <p className="font-bold text-amber-200/90 text-xs sm:text-sm bg-[#1a1512]/80 px-4 py-1.5 rounded-full backdrop-blur-sm border border-amber-800/30">
                                    {breathState.text}
                                </p>
                            </div>
                            
                            {isActive && (
                                <button 
                                    onClick={() => setIsActive(false)}
                                    className="absolute top-3 right-3 text-[10px] sm:text-xs font-bold text-[#8a7e6d] hover:text-amber-400 bg-[#2a2420] px-3 py-1.5 rounded-lg z-30 transition-colors border border-[#3a3028]"
                                >
                                    Parar
                                </button>
                            )}
                        </div>

                        <div className="bg-gradient-to-br from-[#2a2018] to-[#251c14] rounded-2xl p-5 border border-amber-800/20 text-left">
                            <h4 className="font-bold text-amber-300 mb-2 text-sm sm:text-base">Passo 2: Aceitação</h4>
                            <p className="text-xs sm:text-sm text-[#8a7e6d] mb-4">
                                Agora que sua mente está mais calma, clique abaixo para iniciar seu diário com o comando de aceitação.
                            </p>
                            <button 
                                onClick={() => injectQuestion("Apesar de hoje ter sido um dia difícil, eu agradeço por...")}
                                className="w-full bg-gradient-to-r from-amber-600 to-orange-600 text-white font-bold text-xs sm:text-sm px-4 py-3.5 rounded-xl hover:from-amber-500 hover:to-orange-500 transition-all flex items-center justify-center gap-2 shadow-lg shadow-amber-900/30 active:scale-[0.97]"
                            >
                                <Zap size={14} /> Usar Comando S.O.S
                            </button>
                        </div>

                        <button 
                            onClick={() => {
                                setIsActive(false);
                                setActiveBonus(null);
                            }} 
                            className="w-full mt-5 pt-3 flex items-center justify-center gap-1.5 text-[10px] sm:text-xs font-bold text-[#8a7e6d] hover:text-amber-400 uppercase tracking-widest transition-colors border-t border-[#3a3028]"
                        >
                            <ChevronUp size={14} /> Fechar Ritual
                        </button>
                    </div>
                );
            };

            const HistoryView = () => {
                const entriesList = Object.entries(savedEntries).sort((a, b) => b[0].localeCompare(a[0]));

                return (
                    <div className="animate-reveal w-full pb-10">
                        <header className="flex items-center gap-4 mb-8">
                            <button 
                                onClick={() => {
                                    setCurrentView('home');
                                    if (!isRevealed) sortearFrase(); 
                                }}
                                className="w-10 h-10 shrink-0 bg-[#2a2420] border border-[#3a3028] rounded-full flex items-center justify-center text-[#8a7e6d] hover:bg-[#332c24] hover:text-amber-400 transition-colors"
                            >
                                <ArrowLeft size={18} />
                            </button>
                            <div>
                                <h2 className="text-xl sm:text-2xl font-bold text-[#e8ddd0] font-display">Meu Diário</h2>
                                <p className="text-xs sm:text-sm text-[#8a7e6d]">Seu histórico de gratidão.</p>
                            </div>
                        </header>

                        {entriesList.length === 0 ? (
                            <div className="bg-[#231f1a] border border-[#3a3028] rounded-2xl p-8 sm:p-10 text-center">
                                <div className="w-16 h-16 bg-[#2a2420] rounded-full flex items-center justify-center mx-auto mb-4">
                                    <BookOpen size={24} className="text-[#5a5045]" />
                                </div>
                                <p className="text-sm sm:text-base text-[#8a7e6d] font-medium">Seu diário ainda está vazio.</p>
                                <p className="text-xs sm:text-sm text-[#5a5045] mt-2">Revele a frase de hoje e escreva algo para começar.</p>
                            </div>
                        ) : (
                            <div className="space-y-4">
